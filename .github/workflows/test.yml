name: Quality Gate

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build 11ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: _site
          path: _site/
          retention-days: 1

  html-validate:
    name: HTML Validation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: _site
          path: _site/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g html-validate
      - name: Validate all HTML files
        run: |
          FILES=$(find _site -name "*.html" | sort)
          if [ -z "$FILES" ]; then
            echo "No HTML files found"
            exit 0
          fi
          html-validate $FILES

  broken-links:
    name: Broken Link Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: _site
          path: _site/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g linkinator
      - name: Start local server
        run: |
          npx http-server _site -p 8080 -s &
          sleep 2
      - name: Check internal links
        run: |
          linkinator http://localhost:8080 --recurse --skip "^(?!http://localhost)" --format json --timeout 10000 > link-report.json || true
          python3 -c "
          import json, sys
          data = json.load(open('link-report.json'))
          links = data.get('links', data) if isinstance(data, dict) else data
          if isinstance(links, dict):
              links = links.get('links', [])
          broken = [l for l in links if isinstance(l, dict) and l.get('status', 0) >= 400]
          if broken:
              for l in broken:
                  print(f'  {l.get(\"status\",\"?\")} {l.get(\"url\",\"?\")}')
              print(f'::error::Found {len(broken)} broken links')
              sys.exit(1)
          else:
              print('No broken links found')
          "

  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: _site
          path: _site/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm install -g @lhci/cli
          npm install -g http-server
      - name: Start local server
        run: |
          http-server _site -p 8080 -s &
          sleep 2
      - name: Run Lighthouse on key pages
        run: |
          PAGES=("http://localhost:8080/")
          for f in $(find _site -maxdepth 2 -name "index.html" -not -path "_site/index.html" | sort | head -5); do
            DIR=$(dirname "$f" | sed 's|^_site/||')
            PAGES+=("http://localhost:8080/$DIR/")
          done
          FAILED=0
          for URL in "${PAGES[@]}"; do
            echo "=== Testing $URL ==="
            lhci collect --url="$URL" --settings.chromeFlags="--no-sandbox --headless" || true
            REPORT=$(ls -t .lighthouseci/lhr-*.json 2>/dev/null | head -1)
            if [ -f "$REPORT" ]; then
              python3 -c "
          import json, sys
          data = json.load(open(sys.argv[1]))
          cats = data.get('categories', {})
          a11y = int(cats.get('accessibility', {}).get('score', 0) * 100)
          seo = int(cats.get('seo', {}).get('score', 0) * 100)
          print(f'  Accessibility: {a11y} | SEO: {seo}')
          failed = []
          if a11y < 80: failed.append(f'Accessibility {a11y} < 80')
          if seo < 80: failed.append(f'SEO {seo} < 80')
          if failed:
              for f in failed: print(f'  ::warning::{f}')
              sys.exit(1)
          " "$REPORT"
              if [ $? -ne 0 ]; then FAILED=1; fi
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "::error::One or more pages failed Lighthouse gates"
            exit 1
          fi

  playwright:
    name: Smoke Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: _site
          path: _site/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps
      - name: Start local server
        run: |
          npx http-server _site -p 8080 -s &
          sleep 2
      - name: Run smoke tests
        run: npx playwright test tests/ --reporter=list
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tests/screenshots/
          retention-days: 7
