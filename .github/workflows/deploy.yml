name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build 11ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm run build
      - name: Validate build output
        run: |
          echo "=== Build output ==="
          find _site -name "*.html" | sort
          echo ""
          echo "=== Checking for YAML leakage ==="
          if grep -rn '^---$' _site/*.html _site/**/*.html 2>/dev/null; then
            echo "::error::YAML frontmatter leakage detected!"
            exit 1
          fi
          echo "No YAML leakage found"
          echo ""
          echo "=== Checking style tag balance ==="
          for f in $(find _site -name "*.html"); do
            OPEN=$(grep -c '<style' "$f" || true)
            CLOSE=$(grep -c '</style>' "$f" || true)
            if [ "$OPEN" != "$CLOSE" ]; then
              echo "::error::Unbalanced style tags in $f (open=$OPEN, close=$CLOSE)"
              exit 1
            fi
          done
          echo "Style tags balanced"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
